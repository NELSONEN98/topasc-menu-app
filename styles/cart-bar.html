<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Broaster Topasc — Botón Ver carrito</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #6b6b6b; font-family: 'Poppins', sans-serif; padding: 40px; }

  .cart-bar-wrap {
    position: relative;
    width: 390px;
    height: 90px;
    background: #F2ECE3;
    border-radius: 12px;
  }

  .cart-bar {
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: 18px;
    background: #E11E2B;
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 8px 20px rgba(225,30,43,.4);
    cursor: pointer;
    border: none;
    width: calc(100% - 28px);
  }

  .cart-bar-count {
    font: 700 13px 'Poppins', sans-serif;
    color: #fff;
  }

  .cart-bar-total {
    font: 700 14px 'Poppins', sans-serif;
    color: #fff;
  }

  /* Variante estilo DiDi (fondo oscuro, acento amarillo) */
  .cart-bar.dark {
    background: #241C15;
    box-shadow: 0 8px 20px rgba(0,0,0,.3);
  }
  .cart-bar.dark .cart-bar-count {
    color: #FFC629;
  }
</style>
</head>
<body>

  <div class="cart-bar-wrap">
    <button class="cart-bar">
      <span class="cart-bar-count">3 productos</span>
      <span class="cart-bar-total">Ver carrito · $45.000 ›</span>
    </button>
  </div>

  <br>

  <div class="cart-bar-wrap">
    <button class="cart-bar dark">
      <span class="cart-bar-count">3 productos</span>
      <span class="cart-bar-total">Ver carrito · $45.000 ›</span>
    </button>
  </div>

</body>
</html>
