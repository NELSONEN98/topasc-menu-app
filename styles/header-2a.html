<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Broaster Topasc — Header (Riff sobre 1a)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #F2ECE3; font-family: 'Inter', system-ui, sans-serif; }

  /* Contenedor de referencia (ancho de un celular, 390px) */
  .hero-2a {
    position: relative;
    width: 390px;
    height: 170px;
    background: #cfcfcf; /* reemplazar por foto real */
    overflow: hidden;
  }

  .hero-2a-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.55) 100%);
    pointer-events: none;
  }

  .hero-2a-title-block {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 18px;
    pointer-events: none;
  }

  .hero-2a-title-wrap {
    position: relative;
    display: inline-block;
  }

  .hero-2a-title {
    margin: 0;
    font: 400 46px/0.95 'Luckiest Guy', cursive;
    letter-spacing: .5px;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,.45);
  }

  .hero-2a-crest {
    position: absolute;
    top: -13px;
    right: -1px;
    transform: rotate(20deg);
  }
</style>
</head>
<body>

  <div class="hero-2a">
    <div class="hero-2a-gradient"></div>
    <div class="hero-2a-title-block">
      <div class="hero-2a-title-wrap">
        <svg class="hero-2a-crest" width="34" height="20" viewBox="0 0 34 20">
          <circle cx="5" cy="14" r="4" fill="#fff"/>
          <circle cx="17" cy="5" r="6" fill="#fff"/>
          <circle cx="29" cy="14" r="4" fill="#fff"/>
        </svg>
        <p class="hero-2a-title">Broaster</p>
      </div>
      <p class="hero-2a-title">Topasc</p>
    </div>
  </div>

</body>
</html>
